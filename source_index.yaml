schema_version: 0.1.0
last_updated: 2026-04-03

authority_tiers:
  - id: primary-local
    meaning: author-maintained source within this repository and preferred for local extraction
  - id: secondary-local
    meaning: local supporting notes or translations that are useful but not the first canonical source
  - id: provisional-local
    meaning: drafts, review materials, or incomplete writeups requiring caution

collection_defaults:
  books:
    authority_tier: primary-local
    extraction_priority: high
    default_languages: [en, es]
  lmfi:
    authority_tier: primary-local
    extraction_priority: high
    default_languages: [en, es, fr]
  undergrad:
    authority_tier: primary-local
    extraction_priority: very-high
    default_languages: [en, es]
  first-proof:
    authority_tier: provisional-local
    extraction_priority: medium
    default_languages: [en]

